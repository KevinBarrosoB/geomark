<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoMark - Iniciar Sesión</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">

  <link rel="stylesheet" href="styles.css">
</head>

<body class="gm-gradient-bg">

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-6">

        <div class="gm-card card overflow-hidden w3-card-4 w3-round-large">

          <div class="p-4 text-white"
               style="background: linear-gradient(90deg, var(--gm-bg), var(--gm-primary-2));">

            <div class="d-flex align-items-center justify-content-between">
              <h4 class="mb-0 fw-bold">Iniciar Sesión</h4>
              <span class="text-white fs-4">×</span>
            </div>
          </div>

          <div class="card-body p-4">

            <div class="mb-3">
              <label class="form-label fw-semibold">Usuario</label>
              <input
                type="text"
                class="form-control form-control-lg"
                placeholder="Ingresa tu usuario"
              >
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Contraseña</label>
              <input
                type="password"
                class="form-control form-control-lg"
                placeholder="Ingresa tu contraseña"
              >
            </div>

            <button class="btn btn-primary w-100 gm-pill py-3">
              Iniciar Sesión
            </button>

            <div class="mt-4 text-muted w3-center">
              ¿No tienes cuenta? Regístrate
            </div>

          </div>
        </div>

        <div class="text-center mt-3 text-white-50 small">
          Volver al inicio
        </div>

      </div>
    </div>
  </div>

</body>
</html>
